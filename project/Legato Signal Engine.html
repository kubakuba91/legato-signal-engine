<style>

  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #1E3448; border-radius: 2px; }

  /* Tweaks panel */
  #tweaks-panel {
    position: fixed; bottom: 20px; right: 20px; width: 260px;
    background: #0F2035; border: 1px solid #1E3448;

  <div class="tweak-row">
    <label class="tweak-label">Data density</label>
    <select class="tweak-select" id="tweak-density">
      <option value="comfortable">Comfortable</option>

      <option value="bottom">Below table</option>

// ── Sub-components ────────────────────────────────────────────
function ScoreRing({ score, accent }) {
  const r = 24, cx = 30, cy = 30, stroke = 4;
  const circ = 2 * Math.PI * r;
  const dash = (score / 100) * circ;
  return (
    <svg width="60" height="60" viewBox="0 0 60 60">
      <circle cx={cx} cy={cy} r={r} fill="none" stroke={C.bg3} strokeWidth={stroke} />
      <circle cx={cx} cy={cy} r={r} fill="none" stroke={accent} strokeWidth={stroke}
        strokeDasharray={`${dash} ${circ}`} strokeLinecap="round"
        transform={`rotate(-90 ${cx} ${cy})`} />
      <text x={cx} y={cy+1} textAnchor="middle" dominantBaseline="middle"
        fill={accent} fontSize="13" fontWeight="600" fontFamily="DM Mono, monospace">{score}</text>
    </svg>
  );
}

function ScoreBar({ score, accent, employer }) {
  const [show, setShow] = useState(false);
  const [pos, setPos] = useState({ x: 0, y: 0 });

  const handleMouseEnter = (e) => {
    const r = e.currentTarget.getBoundingClientRect();
    setPos({ x: r.left, y: r.top });
    setShow(true);
  };

  return (
    <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}
      onMouseEnter={handleMouseEnter}
      onMouseLeave={() => setShow(false)}
    >
      <span style={{ fontFamily: 'DM Mono', fontSize: 13, fontWeight: 500, color: score >= 90 ? accent : score >= 80 ? C.text : C.text2, minWidth: 24 }}>{score}</span>
      <div style={{ width: 52, height: 3, background: C.bg3, borderRadius: 2, overflow: 'hidden', cursor: 'default' }}>
        <div style={{ width: `${score}%`, height: '100%', background: score >= 90 ? accent : score >= 80 ? C.blue : C.text3, borderRadius: 2 }} />
      </div>
      {show && employer && ReactDOM.createPortal(
        <div style={{
          position: 'fixed', left: pos.x, top: pos.y - 8, transform: 'translateY(-100%)',
          zIndex: 9999, background: C.bg2, border: `1px solid ${C.border2}`,
          borderRadius: 7, padding: '10px 12px', width: 200,
          boxShadow: '0 6px 20px rgba(0,0,0,0.6)', pointerEvents: 'none',
        }}>
          <div style={{ fontSize: 10, color: C.text3, textTransform: 'uppercase', letterSpacing: '0.08em', marginBottom: 8 }}>Score breakdown</div>
          {[
            { label: 'Intent signals',  val: Math.round(score * 0.35), max: 35 },
            { label: 'Financial fit',   val: Math.round(score * 0.28), max: 28 },
            { label: 'Workforce match', val: Math.round(score * 0.22), max: 22 },
            { label: 'Regulatory risk', val: Math.round(score * 0.15), max: 15 },
          ].map(row => (
            <div key={row.label} style={{ marginBottom: 6 }}>
              <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 3 }}>
                <span style={{ fontSize: 10, color: C.text2 }}>{row.label}</span>
                <span style={{ fontSize: 10, fontFamily: 'DM Mono', color: C.text }}>{row.val}<span style={{ color: C.text3 }}>/{row.max}</span></span>
              </div>
              <div style={{ height: 2, background: C.bg3, borderRadius: 1 }}>
                <div style={{ width: `${(row.val / row.max) * 100}%`, height: '100%', background: accent, borderRadius: 1 }} />
              </div>
            </div>
          ))}
          <div style={{ marginTop: 8, paddingTop: 8, borderTop: `1px solid ${C.border}`, display: 'flex', justifyContent: 'space-between' }}>
            <span style={{ fontSize: 10, color: C.text3 }}>Composite</span>
            <span style={{ fontSize: 11, fontFamily: 'DM Mono', fontWeight: 600, color: accent }}>{score}</span>
          </div>
        </div>,
        document.body
      )}
    </div>
  );
}

function SignalTag({ label }) {
  const col = signalColors[label] || { bg: C.bg3, text: C.text2 };
  return (
    <span style={{ fontSize: 10, fontWeight: 500, padding: '2px 6px', borderRadius: 3, background: col.bg, color: col.text, letterSpacing: '0.02em' }}>{label}</span>
  );
}

function StatusBadge({ status, accent }) {
  const map = {
    routed:  { bg: 'rgba(0,201,167,0.1)',  text: accent,  label: 'Routed' },
    new:     { bg: 'rgba(79,158,240,0.1)', text: C.blue,  label: 'New' },
    pending: { bg: 'rgba(245,158,11,0.1)', text: C.amber, label: 'Pending' },
  };
  const s = map[status];
  return (
    <span style={{ fontSize: 10, fontWeight: 600, padding: '3px 8px', borderRadius: 3, background: s.bg, color: s.text, letterSpacing: '0.05em', textTransform: 'uppercase' }}>{s.label}</span>
  );
}

function BrokerPill({ broker }) {
  if (!broker) return <span style={{ color: C.text3, fontSize: 12 }}>Unassigned</span>;
  return (
    <div style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
      <div style={{ width: 22, height: 22, borderRadius: '50%', background: broker.color + '22', border: `1px solid ${broker.color}44`, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 9, fontWeight: 700, color: broker.color, fontFamily: 'DM Mono' }}>
        {broker.initials}
      </div>
      <span style={{ fontSize: 12, color: C.text2 }}>{broker.name}</span>
    </div>
  );
}

function PriorityDot({ score }) {
  const color = score >= 90 ? C.teal : score >= 80 ? C.blue : C.amber;
  return <div style={{ width: 7, height: 7, borderRadius: '50%', background: color, flexShrink: 0 }} />;
}

              <div style={{ position: 'relative' }}>
                {!employer.broker ? (
                  <button onClick={() => setShowPicker(p => !p)} style={{
                    fontSize: 11, fontWeight: 500, padding: '5px 10px', borderRadius: 5, cursor: 'pointer',
                    fontFamily: 'DM Sans', background: C.amber + '18', color: C.amber,
                    border: `1px solid ${C.amber}44`, display: 'flex', alignItems: 'center', gap: 5,
                  }}>
                    <svg width="11" height="11" viewBox="0 0 12 12" fill="none"><circle cx="5" cy="4" r="2.2" stroke="currentColor" strokeWidth="1.3"/><path d="M1 11c0-2.21 1.79-4 4-4s4 1.79 4 4" stroke="currentColor" strokeWidth="1.3" strokeLinecap="round"/><line x1="9.5" y1="7" x2="9.5" y2="11" stroke="currentColor" strokeWidth="1.3" strokeLinecap="round"/><line x1="7.5" y1="9" x2="11.5" y2="9" stroke="currentColor" strokeWidth="1.3" strokeLinecap="round"/></svg>

                  </button>
                ) : (
                  <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'flex-start', gap: 3 }}>
                    <div style={{ fontSize: 9, color: C.text3, textTransform: 'uppercase', letterSpacing: '0.08em' }}>Assigned to</div>
                    <div style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
                      <div style={{ width: 22, height: 22, borderRadius: '50%', background: employer.broker.color + '22', border: `1px solid ${employer.broker.color}55`, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 9, fontWeight: 700, color: employer.broker.color, fontFamily: 'DM Mono' }}>{employer.broker.initials}</div>
                      <span style={{ fontSize: 11, color: C.text2 }}>{employer.broker.name}</span>
                      <button onClick={() => setShowPicker(p => !p)} style={{ fontSize: 10, color: C.text3, background: 'none', border: 'none', cursor: 'pointer', fontFamily: 'DM Sans' }}>Change</button>
                    </div>
                  </div>
                )}
                {showPicker && (
                  <BrokerPicker accent={accent}
                    onAssign={b => { onAssign(b); setShowPicker(false); }}
                    onCancel={() => setShowPicker(false)} />
                )}
              </div>
              <button onClick={onClose} style={{ background: 'none', border: 'none', color: C.text3, cursor: 'pointer', fontSize: 18, lineHeight: 1, padding: '2px 6px' }}>×</button>
            </div>
          </div>

          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(2, 1fr)', gap: 10, marginBottom: 18 }}>
            {cards.map(c => (
              <div key={c.label} style={{ background: C.bg2, border: `1px solid ${C.border}`, borderRadius: 7, padding: '14px 16px' }}>
                <div style={{ fontSize: 10, color: C.text3, marginBottom: 8, letterSpacing: '0.04em' }}>{c.label}</div>
                <div style={{ fontSize: 16, fontFamily: 'DM Mono', fontWeight: 500, color: C.text }}>{c.value}</div>
              </div>
            ))}
          </div>

          {/* Signal sources */}
          <div style={{ marginBottom: 16 }}>
            <div style={{ fontSize: 10, color: C.text3, textTransform: 'uppercase', letterSpacing: '0.1em', marginBottom: 8 }}>Signal breakdown</div>
            <div style={{ display: 'flex', flexDirection: 'column', gap: 6 }}>
              {employer.sources.map(s => (
                <div key={s.name} style={{ display: 'flex', alignItems: 'flex-start', gap: 10, padding: '8px 10px', background: C.bg2, border: `1px solid ${C.border}`, borderRadius: 5 }}>

                    <span style={{ fontSize: 11, fontWeight: 600, color: accent, fontFamily: 'DM Mono' }}>{s.name}</span>
                    <span style={{ fontSize: 11, color: C.text2, marginLeft: 8 }}>{s.found}</span>
                  </div>
                </div>
              ))}
            </div>
          </div>

          {/* Action buttons */}
          <div style={{ display: 'flex', gap: 8, alignItems: 'center' }}>
            {['Draft outreach', 'Find similar', 'Apollo contacts'].map((label, i) => (
              <button key={label} style={{
                fontSize: 12, fontWeight: 500, padding: '7px 14px', borderRadius: 5, cursor: 'pointer',
                fontFamily: 'DM Sans',
                background: i === 0 ? accent : 'transparent',
                color: i === 0 ? '#0B1929' : C.text2,
                border: i === 0 ? 'none' : `1px solid ${C.border2}`,
                transition: 'opacity 0.15s',
              }}
              onMouseEnter={e => e.target.style.opacity = '0.8'}
              onMouseLeave={e => e.target.style.opacity = '1'}

            ))}

      </div>

function MapView({ employers, accent }) {
  const [selectedState, setSelectedState] = useState(null);
  const [hoveredState, setHoveredState] = useState(null);

  const getStateAbbr = (loc) => loc.split(', ')[1];

  const stateEmps = {};
  employers.forEach(e => {
    const s = getStateAbbr(e.location);
    if (!stateEmps[s]) stateEmps[s] = [];
    stateEmps[s].push(e);
  });

  const TILE = 58, GAP = 4;
  const cols = 11, rows = 8;
  const mapW = cols * (TILE + GAP);
  const mapH = rows * (TILE + GAP);

  const filtered = selectedState
    ? employers.filter(e => getStateAbbr(e.location) === selectedState)
    : employers;

  const getColor = (abbr) => {
    const emps = stateEmps[abbr];
    if (!emps) return C.bg2;
    const best = Math.max(...emps.map(e => e.score));
    if (best >= 90) return accent + '30';
    if (best >= 80) return C.blue + '25';
    return C.amber + '20';
  };

  const getBorder = (abbr) => {
    if (selectedState === abbr) return accent;
    if (hoveredState === abbr) return C.border2;
    if (stateEmps[abbr]) return C.border2;
    return C.border;
  };

  return (
    <div style={{ flex: 1, display: 'flex', overflow: 'hidden', padding: '16px 18px', gap: 16 }}>
      {/* Map */}
      <div style={{ flex: 1, display: 'flex', flexDirection: 'column', overflow: 'hidden' }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 12, marginBottom: 14 }}>
          <div style={{ fontSize: 12, color: C.text2, fontWeight: 500 }}>National opportunity map</div>
          <div style={{ marginLeft: 'auto', display: 'flex', gap: 10, alignItems: 'center' }}>
            {[{label:'Score 90+', color: accent},{label:'Score 80+', color: C.blue},{label:'Score <80', color: C.amber}].map(l => (
              <div key={l.label} style={{ display: 'flex', alignItems: 'center', gap: 5 }}>
                <div style={{ width: 8, height: 8, borderRadius: 2, background: l.color + '60', border: `1px solid ${l.color}` }} />
                <span style={{ fontSize: 10, color: C.text3 }}>{l.label}</span>
              </div>
            ))}
            {selectedState && (
              <button onClick={() => setSelectedState(null)} style={{ fontSize: 10, color: C.text3, background: C.bg2, border: `1px solid ${C.border}`, borderRadius: 4, padding: '3px 8px', cursor: 'pointer', fontFamily: 'DM Sans', marginLeft: 8 }}>
                Clear filter ×
              </button>
            )}
          </div>
        </div>
        <div style={{ flex: 1, display: 'flex', alignItems: 'center', justifyContent: 'center', overflow: 'hidden' }}>
          <svg width="100%" height="100%" viewBox={`0 0 ${mapW} ${mapH}`} preserveAspectRatio="xMidYMid meet" style={{ maxWidth: '100%', maxHeight: '100%' }}>
            {STATE_GRID.map(({ a, r, c }) => {
              const x = c * (TILE + GAP);
              const y = r * (TILE + GAP);
              const emps = stateEmps[a] || [];
              const isSelected = selectedState === a;
              const isHovered = hoveredState === a;
              return (
                <g key={a} style={{ cursor: emps.length ? 'pointer' : 'default' }}
                  onClick={() => emps.length && setSelectedState(isSelected ? null : a)}
                  onMouseEnter={() => setHoveredState(a)}
                  onMouseLeave={() => setHoveredState(null)}
                >
                  <rect x={x} y={y} width={TILE} height={TILE} rx={4}
                    fill={getColor(a)}
                    stroke={getBorder(a)}
                    strokeWidth={isSelected ? 1.5 : 1}
                    style={{ transition: 'all 0.15s' }}
                  />
                  <text x={x + TILE/2} y={y + TILE/2 - (emps.length ? 4 : 0)} textAnchor="middle" dominantBaseline="middle"
                    fontSize="9" fontWeight={emps.length ? 600 : 400}
                    fill={emps.length ? (isSelected ? accent : C.text2) : C.text3}
                    fontFamily="DM Mono, monospace"
                  >{a}</text>
                  {emps.length > 0 && (
                    <text x={x + TILE/2} y={y + TILE/2 + 8} textAnchor="middle" dominantBaseline="middle"
                      fontSize="10" fontWeight="700"
                      fill={isSelected ? accent : emps[0].score >= 90 ? accent : C.blue}
                      fontFamily="DM Mono, monospace"
                    >{emps.length}</text>
                  )}
                </g>
              );
            })}
          </svg>
        </div>
      </div>

      {/* Sidebar list */}
      <div style={{ width: 320, background: C.bg1, border: `1px solid ${C.border}`, borderRadius: 8, display: 'flex', flexDirection: 'column', overflow: 'hidden', flexShrink: 0 }}>
        <div style={{ padding: '12px 14px', borderBottom: `1px solid ${C.border}`, display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
          <span style={{ fontSize: 12, fontWeight: 500, color: C.text }}>
            {selectedState ? (STATE_NAMES[selectedState] || selectedState) : 'All opportunities'}
          </span>
          <span style={{ fontSize: 10, fontFamily: 'DM Mono', color: C.text3 }}>{filtered.length} employers</span>
        </div>
        <div style={{ flex: 1, overflowY: 'auto' }}>
          {filtered.length === 0 && (
            <div style={{ padding: 24, textAlign: 'center', color: C.text3, fontSize: 12 }}>No opportunities in this state</div>

            </div>

        <div style={{ padding: '10px 14px', borderTop: `1px solid ${C.border}`, fontSize: 10, color: C.text3 }}>
          Click a state to filter · Highlighted states have active leads
        </div>
      </div>
    </div>
  );
}

function App() {

    setEmployerData(prev => prev.map(e => e.id === employerId
      ? { ...e, broker, status: 'routed' }
      : e
    ));
  };

  // Tweaks wiring
  useEffect(() => {
    window.addEventListener('message', (e) => {
      if (e.data?.type === '__activate_edit_mode') document.getElementById('tweaks-panel').classList.add('visible');
      if (e.data?.type === '__deactivate_edit_mode') document.getElementById('tweaks-panel').classList.remove('visible');
    });
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');

    const accent = document.getElementById('tweak-accent');
    const density = document.getElementById('tweak-density');
    const panel = document.getElementById('tweak-panel');
    accent.value = tweaks.accent;
    density.value = tweaks.density;
    panel.value = tweaks.panelPos;

    const apply = () => {
      const vals = { accent: accent.value, density: density.value, panelPos: panel.value };
      setTweaks(vals);
      window.parent.postMessage({ type: '__edit_mode_set_keys', edits: vals }, '*');
    };
    accent.addEventListener('change', apply);
    density.addEventListener('change', apply);
    panel.addEventListener('change', apply);
  }, []);

  return (
    <div style={{ display: 'flex', width: '100vw', height: '100vh', overflow: 'hidden' }}>
      <Sidebar active={nav} onNav={setNav} accent={tweaks.accent} />
      <div style={{ flex: 1, display: 'flex', flexDirection: 'column', overflow: 'hidden' }}>
        <TopBar accent={tweaks.accent} navLabel={navItems.find(n => n.id === nav)?.label} />
        {nav === 'feed' && <StatCards accent={tweaks.accent} />}
        {/* Table + detail panel */}
        {nav === 'map' ? (
          <MapView employers={employerData} accent={tweaks.accent} />
        ) : nav === 'feed' ? (
        <div style={{ flex: 1, overflow: 'hidden', display: 'flex', flexDirection: tweaks.panelPos === 'right' ? 'row' : 'column', paddingBottom: tweaks.panelPos === 'bottom' ? 0 : 18, gap: 0 }}>
          <LeadTable accent={tweaks.accent} density={tweaks.density} selectedId={selectedId} onSelect={setSelectedId} employers={employerData} panelOpen={!!selectedEmployer} />
          {selectedEmployer && tweaks.panelPos === 'right' && (
            <div style={{ width: 500, borderLeft: `1px solid ${C.border}`, background: C.bg1, overflowY: 'auto', flexShrink: 0 }}>
              <DetailPanel employer={selectedEmployer} accent={tweaks.accent} onClose={() => setSelectedId(null)} onAssign={(b) => handleAssign(selectedEmployer.id, b)} />
            </div>
          )}
          {selectedEmployer && tweaks.panelPos === 'bottom' && (
            <div style={{ flexShrink: 0, overflowY: 'auto', maxHeight: 'min(340px, 45vh)', marginTop: 10, marginBottom: 10 }}>
              <DetailPanel employer={selectedEmployer} accent={tweaks.accent} onClose={() => setSelectedId(null)} onAssign={(b) => handleAssign(selectedEmployer.id, b)} />
            </div>
          )}
        </div>
        ) : (
        <div style={{ flex: 1, display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', gap: 12 }}>
          <div style={{ width: 48, height: 48, borderRadius: 12, background: C.bg2, border: `1px solid ${C.border}`, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 22, color: C.text3 }}>
            {navItems.find(n => n.id === nav)?.icon}
          </div>
          <div style={{ fontSize: 15, fontWeight: 500, color: C.text }}>{navItems.find(n => n.id === nav)?.label}</div>
          <div style={{ fontSize: 12, color: C.text3 }}>Coming soon</div>
          <div style={{ marginTop: 4, fontSize: 11, color: C.text3, padding: '5px 12px', background: C.bg2, border: `1px solid ${C.border}`, borderRadius: 20, fontFamily: 'DM Mono' }}>In development</div>
        </div>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
